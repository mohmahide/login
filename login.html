<!DOCTYPE html>
<html lang="fa"  >
  <head>
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--Import materialize.css-->
    <link type="text/css" rel="stylesheet" href="css/materialize.min.css"  media="screen,projection"/>
    <link rel="stylesheet" href="css/style.css">
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  </head>

 <body>
<div class="container">
  <div class="row valign-wrapper full-height">
    <div class="col s12 m8 l6 offset-m2 offset-l3"> 
        <div class="cat-container center-align">
        <img src="image/cat.png" alt="cats looking over the panel" class="responsive-img cat-image">
        </div>
      <div class="card-panel grey lighten-5 center-align hoverable">
        
        <h4>مشخصات ورود خود را وارد کنید</h4>

        <form>
          <div class="row ">
            <div class="input-field col s12 ">
              <input id="first_name" type="text" class="validate  right-align">
              <label for="first_name" ">نام کاربری یا ایمیل</label>
              <!-- اینجا به جای prefix از right استفاده کردیم -->
              <i class="material-icons prefix">person</i> 
            </div>
          </div>

          <div class="row right-align">
            <div class="input-field col s12 ">
              <input id="password" type="password" class="validate right-align">
              <label for="password" class="right-align">رمز عبور</label>
              <!-- اینجا به جای prefix از right استفاده کردیم -->
              <i class="material-icons prefix">lock</i> 
            </div>
          </div>

          <button class="btn waves-effect waves-light" type="submit" name="action">
            ارسال
            <i class="material-icons right">send</i>
          </button>
        </form>


      </div>
    </div>
  </div>
</div>
    <!--JavaScript at end of body for optimized loading-->
    <script type="text/javascript" src="js/materialize.min.js"></script>
  </body>
</html>
